<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CursorDance 测试页</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 96px 24px;
      }
      .panel {
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        background: white;
        padding: 32px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      button {
        border: 0;
        border-radius: 999px;
        background: #4f46e5;
        color: white;
        padding: 12px 20px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>CursorDance 测试页</h1>
        <p>这是一个普通 http 页面。加载扩展后，在这里任意点击，应该可以看到鼠标特效。</p>
        <button type="button">点击我测试特效</button>
      </section>
    </main>
  </body>
</html>
