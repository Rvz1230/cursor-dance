<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CursorDance</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand-mark">✦</div>
        <div>
          <h1>CursorDance</h1>
          <p>鼠标点击特效</p>
        </div>
      </header>

      <section class="status-card">
        <div id="statusIcon" class="status-icon">✓</div>
        <div class="status-copy">
          <div id="statusTitle" class="status-title">已开启</div>
          <div id="statusDesc" class="status-desc">普通网页点击会显示特效</div>
        </div>
        <button id="toggleButton" class="switch" type="button" role="switch" aria-checked="true" aria-label="开启或关闭 CursorDance">
          <span></span>
        </button>
      </section>

      <section class="preview-card">
        <div>
          <div class="eyebrow">当前方案</div>
          <h2 id="schemeName">Cute Pink</h2>
          <p id="schemeSummary">左键点击显示粉色飘字、波纹和粒子。</p>
        </div>
        <div id="schemeThumb" class="preview-thumb">超棒!</div>
      </section>

      <section class="scheme-list-card">
        <div class="section-title">内置方案</div>
        <div id="schemeList" class="scheme-list" role="list"></div>
      </section>

      <section class="site-card">
        <div class="section-title">当前网站</div>
        <div id="siteHost" class="site-host">读取中...</div>
        <p id="siteDesc" class="site-desc">会按当前网页单独决定是否启用特效。</p>
        <div class="site-mode-group" role="group" aria-label="当前网站规则">
          <button id="siteModeInherit" class="site-mode-button" type="button" data-site-mode="inherit">跟随全局</button>
          <button id="siteModeEnabled" class="site-mode-button" type="button" data-site-mode="enabled">当前启用</button>
          <button id="siteModeDisabled" class="site-mode-button" type="button" data-site-mode="disabled">当前禁用</button>
        </div>
      </section>

      <section class="editor-card">
        <label for="textInput">飘字文案</label>
        <div class="editor-row">
          <input id="textInput" type="text" maxlength="12" autocomplete="off" />
          <button id="saveTextButton" type="button">保存</button>
        </div>
        <div class="editor-meta">
          <span id="textCount">0/12</span>
          <span id="saveMessage">保存后会立即同步到网页。</span>
        </div>
      </section>

      <button id="previewButton" class="primary-action" type="button">预览当前方案</button>
      <button id="optionsButton" class="secondary-action" type="button">打开详细设置</button>
      <p id="previewMessage" class="hint">会在当前普通网页中心播放一次点击特效。</p>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
